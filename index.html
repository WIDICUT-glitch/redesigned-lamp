<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AirX Market</title>
    <link rel="stylesheet" href="den.css">
</head>
<body>

<!-- Navigation -->
<header>
    <nav class="navbar">
        <h1>✈️ AirX Market</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Marketplace</a></li>
            <li><a href="#">Community</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <h2>Buy, Sell & Connect</h2>
    <p>Your social marketplace for everything!</p>
</section>

<!-- Main Content -->
<div class="container">

    <!-- Post Section -->
    <section class="card">
        <h2>Create a Post</h2>
        <textarea id="postInput" placeholder="What's on your mind?"></textarea>
        <button onclick="addPost()">Post</button>
    </section>

    <section class="card">
        <h2>Community Posts</h2>
        <div id="posts"></div>
    </section>

    <!-- Marketplace Section -->
    <section class="card">
        <h2>Sell an Item</h2>
        <input type="text" id="itemName" placeholder="Item name">
        <input type="text" id="itemPrice" placeholder="Price">
        <button onclick="addItem()">Sell</button>
    </section>

    <section class="card">
        <h2>Marketplace</h2>
        <div id="market"></div>
    </section>

</div>

<script src="den.js"></script>
</body>
</html>
